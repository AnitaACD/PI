name: 🚀 CI/CD — Sistema de Gestión

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ════════════════════════════════════════
  #  INTEGRACIÓN CONTINUA
  # ════════════════════════════════════════
  ci:
    name: 🧪 CI — Pruebas automáticas
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Instalar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependencias
        working-directory: SistemaGestion_2
        run: |
          pip install flask python-dotenv pyodbc flask-login \
                      flask-cors werkzeug pytest 2>/dev/null || true
          pip install flask python-dotenv flask-login \
                      flask-cors werkzeug pytest

      - name: 🔍 Verificar sintaxis Python
        working-directory: SistemaGestion_2
        run: |
          echo "=== Verificando sintaxis Python ==="
          python -m py_compile app.py && echo "✅ app.py OK"
          python -m py_compile db.py  && echo "✅ db.py OK"

      - name: 🧪 Ejecutar pruebas automáticas
        working-directory: SistemaGestion_2
        run: |
          echo "=== Ejecutando tests ==="
          python tests/test_app.py

      - name: 🐳 Validar docker-compose
        working-directory: SistemaGestion_2
        run: |
          docker compose config
          echo "✅ docker-compose.yml válido"

      - name: 🏗️ Build imagen Docker
        working-directory: SistemaGestion_2
        run: |
          docker compose build flask_app
          echo "✅ Build exitoso"

  # ════════════════════════════════════════
  #  ENTREGA CONTINUA (solo merge a main)
  # ════════════════════════════════════════
  cd:
    name: 🚀 CD — Despliegue automático
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔑 Configurar SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: 🌐 Agregar VPS a known_hosts
        run: ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: 🚢 Desplegar en VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'DEPLOY'
            set -e
            echo "📂 Actualizando código..."
            cd /opt/PI
            git pull origin main

            echo "🐳 Reconstruyendo contenedores..."
            cd SistemaGestion_2
            docker compose down
            docker compose up -d --build --remove-orphans

            echo "🧹 Limpiando imágenes antiguas..."
            docker image prune -f

            echo "✅ Despliegue completado"
            docker compose ps
          DEPLOY

      - name: ✅ Verificar app en producción
        run: |
          sleep 30
          curl --fail --retry 5 --retry-delay 10 \
            http://${{ secrets.VPS_HOST }}:5000 \
            && echo "✅ App respondiendo" \
            || { echo "❌ App no responde"; exit 1; }
